name: mnemo-rag

services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /home/dgnaro/storage/mnemo/rag/qdrant/storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mnemo-net
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
networks:
  mnemo-net:
    driver: bridge
